<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dosage Calc — Learn from Scratch</title>
<style>
  :root{
    --bg:#0f1724; --panel:#16213a; --panel2:#1d2b48; --card:#1b2742;
    --ink:#e8eefc; --muted:#9fb0d0; --line:#2a3a5e;
    --teal:#34d3b5; --teal-d:#1d9c84; --indigo:#7c8cff; --amber:#ffcb6b;
    --good:#39d98a; --good-bg:#13351f; --bad:#ff7a85; --bad-bg:#3a1620;
    --chip:#23365f;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 700px at 80% -10%,#1b2c50 0%,#0f1724 55%);
    color:var(--ink); line-height:1.6; min-height:100vh;
  }
  a{color:var(--teal)}
  .app{display:flex; min-height:100vh}

  /* Sidebar */
  .side{
    width:280px; flex:0 0 280px; background:var(--panel);
    border-right:1px solid var(--line); padding:18px 14px; position:sticky; top:0; height:100vh; overflow-y:auto;
  }
  .brand{display:flex; align-items:center; gap:10px; padding:6px 8px 14px}
  .brand .logo{font-size:26px}
  .brand h1{font-size:16px; margin:0; line-height:1.2}
  .brand small{color:var(--muted); font-weight:500}
  .progress-wrap{padding:6px 8px 14px}
  .bar{height:8px; background:#0c1322; border-radius:99px; overflow:hidden}
  .bar > i{display:block; height:100%; width:0; background:linear-gradient(90deg,var(--teal),var(--indigo)); transition:width .4s}
  .progress-wrap span{font-size:12px; color:var(--muted)}
  nav button{
    display:flex; align-items:center; gap:10px; width:100%; text-align:left;
    background:transparent; border:none; color:var(--ink); padding:10px 12px; border-radius:10px;
    cursor:pointer; font-size:14.5px; margin-bottom:2px;
  }
  nav button:hover{background:var(--panel2)}
  nav button.active{background:linear-gradient(90deg,rgba(52,211,181,.18),rgba(124,140,255,.12)); box-shadow:inset 0 0 0 1px var(--line)}
  nav button .ic{width:26px; text-align:center; font-size:17px}
  nav button .nm{flex:1}
  nav button .ck{font-size:13px; color:var(--good)}
  .side .reset{margin-top:14px; font-size:12px; color:var(--muted); background:none; border:1px dashed var(--line); width:100%; padding:8px; border-radius:8px; cursor:pointer}
  .side .reset:hover{color:var(--bad)}
  .navlabel{display:flex; align-items:center; gap:8px; margin:16px 6px 6px; font-size:11px; font-weight:800; letter-spacing:.08em; color:var(--amber); text-transform:uppercase}
  .navlabel::after{content:""; flex:1; height:1px; background:linear-gradient(90deg,var(--amber),transparent); opacity:.4}

  /* Main */
  main{flex:1; padding:34px 40px 80px; max-width:920px}
  h2.title{font-size:28px; margin:0 0 4px}
  .sub{color:var(--muted); margin:0 0 24px}
  .card{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:22px 24px; margin-bottom:20px; box-shadow:0 8px 30px rgba(0,0,0,.18)}
  .card h3{margin:0 0 10px; font-size:19px}
  .card h4{margin:18px 0 8px; font-size:15px; color:var(--teal)}
  p.lead{font-size:16px}
  ul.tidy{padding-left:18px} ul.tidy li{margin:5px 0}
  .callout{border-left:3px solid var(--amber); background:rgba(255,203,107,.08); padding:12px 16px; border-radius:0 10px 10px 0; margin:16px 0}
  .callout.tip{border-color:var(--teal); background:rgba(52,211,181,.08)}
  .callout.warn{border-color:var(--bad); background:rgba(255,122,133,.08)}
  .callout b{color:var(--ink)}
  code.k{background:#0c1322; padding:2px 7px; border-radius:6px; font-size:13.5px; color:var(--amber)}

  /* conversion table */
  table.conv{width:100%; border-collapse:collapse; margin:8px 0}
  table.conv td{padding:8px 10px; border-bottom:1px solid var(--line); font-size:14.5px}
  table.conv td:first-child{color:var(--teal); font-weight:600; white-space:nowrap}

  /* unit chips */
  .chip{display:inline-block; background:var(--chip); border-radius:6px; padding:0 6px; font-size:.92em; color:#bcd0ff}

  /* DA fraction chain */
  .da{display:flex; align-items:center; flex-wrap:wrap; gap:10px; margin:14px 0; font-size:18px}
  .da .eq{color:var(--muted); font-weight:700}
  .da .op{color:var(--muted); font-size:22px; font-weight:700}
  .frac{display:inline-flex; flex-direction:column; align-items:center; text-align:center; min-width:64px}
  .frac .top,.frac .bot{padding:4px 12px; white-space:nowrap}
  .frac .top{border-bottom:2px solid var(--ink)}
  .frac.single .top{border-bottom:none}
  .unit{color:#bcd0ff}
  .num{color:var(--ink); font-weight:600}
  .struck{position:relative; opacity:.5}
  .struck::after{content:""; position:absolute; left:-2px; right:-2px; top:50%; height:2px; background:var(--bad); transform:rotate(-12deg)}
  .result-line{font-size:16px; margin-top:6px; color:var(--muted)}
  .result-line b{color:var(--teal); font-size:18px}

  /* practice */
  .qbox{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:22px 24px}
  .qmeta{display:flex; justify-content:space-between; align-items:center; color:var(--muted); font-size:13px; margin-bottom:10px}
  .qprompt{font-size:17px; margin:6px 0 16px}
  .qprompt .ord{color:var(--amber); font-weight:600}
  .answer-row{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
  .answer-row input{
    font-size:20px; padding:10px 14px; width:150px; border-radius:10px; border:1px solid var(--line);
    background:#0c1322; color:var(--ink); text-align:right;
  }
  .answer-row .unit-tag{font-size:18px; color:var(--muted)}
  button.btn{background:linear-gradient(90deg,var(--teal-d),var(--teal)); color:#06241d; font-weight:700; border:none; padding:11px 20px; border-radius:10px; cursor:pointer; font-size:15px}
  button.btn:hover{filter:brightness(1.07)}
  button.ghost{background:transparent; border:1px solid var(--line); color:var(--ink)}
  button.ghost:hover{background:var(--panel2)}
  .feedback{margin-top:16px; padding:14px 16px; border-radius:12px; display:none}
  .feedback.show{display:block}
  .feedback.ok{background:var(--good-bg); border:1px solid #1f6e44}
  .feedback.no{background:var(--bad-bg); border:1px solid #7a2733}
  .feedback h5{margin:0 0 6px; font-size:15px}
  .feedback.ok h5{color:var(--good)} .feedback.no h5{color:var(--bad)}
  .solution{margin-top:10px; background:#0c1322; border-radius:10px; padding:6px 16px}
  .scorepill{background:var(--chip); padding:4px 10px; border-radius:99px; font-size:13px}

  .mcq{display:flex; flex-direction:column; gap:10px; margin:10px 0}
  .mcq button{text-align:left; background:#0c1322; border:1px solid var(--line); color:var(--ink); padding:12px 14px; border-radius:10px; cursor:pointer; font-size:15px}
  .mcq button:hover{border-color:var(--teal)}
  .mcq button.correct{background:var(--good-bg); border-color:#1f6e44}
  .mcq button.wrong{background:var(--bad-bg); border-color:#7a2733}

  .start-row{display:flex; gap:12px; flex-wrap:wrap; margin-top:8px}
  .seg{display:flex; gap:8px; flex-wrap:wrap; margin:10px 0}
  .seg button{background:#0c1322; border:1px solid var(--line); color:var(--ink); padding:8px 14px; border-radius:99px; cursor:pointer; font-size:13.5px}
  .seg button.on{background:var(--teal); color:#06241d; font-weight:700; border-color:var(--teal)}
  .hidden{display:none}
  .steps{counter-reset:s; padding-left:0; list-style:none}
  .steps li{position:relative; padding:6px 0 6px 38px; margin:2px 0}
  .steps li::before{counter-increment:s; content:counter(s); position:absolute; left:0; top:6px; width:24px; height:24px; background:var(--teal); color:#06241d; border-radius:50%; text-align:center; font-weight:700; font-size:13px; line-height:24px}
  .pill-tabs{display:flex; gap:8px; margin-bottom:18px}
  .pill-tabs button{background:var(--panel); border:1px solid var(--line); color:var(--muted); padding:8px 18px; border-radius:99px; cursor:pointer; font-size:14px}
  .pill-tabs button.on{background:var(--indigo); color:#0a1024; font-weight:700; border-color:var(--indigo)}

  /* mobile top bar + drawer scaffolding (hidden on desktop) */
  .topbar{display:none}
  .overlay{display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:45}
  .hamburger{background:transparent; border:1px solid var(--line); color:var(--ink); font-size:20px;
    width:44px; height:44px; border-radius:10px; cursor:pointer; line-height:1; flex:0 0 auto}

  @media (max-width:780px){
    .app{flex-direction:column}
    /* top bar shows the hamburger + title; everything else lives in the drawer */
    .topbar{display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:40;
      background:rgba(22,33,58,.97); backdrop-filter:blur(8px); border-bottom:1px solid var(--line);
      padding:9px 14px}
    .tb-title{font-weight:700; font-size:16px}
    /* sidebar becomes an off-canvas drawer */
    .side{position:fixed; top:0; left:0; height:100vh; width:84%; max-width:300px; flex:none;
      transform:translateX(-100%); transition:transform .25s ease; z-index:50; overflow-y:auto;
      border-right:1px solid var(--line); box-shadow:0 0 50px rgba(0,0,0,.5)}
    .side.open{transform:translateX(0)}
    .overlay.show{display:block}
    main{padding:20px 16px 64px}
    h2.title{font-size:23px}
    .card,.qbox{padding:18px 16px}
    /* keep wide equations inside their box instead of stretching the page */
    .da{overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:4px}
    .answer-row input{width:130px}
  }
</style>
</head>
<body>
<header class="topbar">
  <button class="hamburger" id="hambtn" aria-label="Open menu">☰</button>
  <span class="tb-title">💊 Dosage Calc Lab</span>
</header>
<div class="overlay" id="overlay"></div>
<div class="app">
  <aside class="side">
    <div class="brand">
      <div class="logo">💊</div>
      <div><h1>Dosage Calc Lab</h1><small>from scratch · go slow</small></div>
    </div>
    <div class="progress-wrap">
      <div class="bar"><i id="progbar"></i></div>
      <span id="progtext">0 of 0 modules done</span>
    </div>
    <nav id="nav"></nav>
    <button class="reset" id="resetBtn">↺ Reset all my progress</button>
  </aside>
  <main id="main"></main>
</div>

<script>
/* ============================================================
   CORE ENGINE — Dimensional Analysis chains
   A "chain" is an array of factors: {tv,tu,bv,bu}
   meaning (tv tu) / (bv bu). Multiply tops, multiply bots, divide.
   The numeric answer is ALWAYS computed from the chain, so the
   worked solution and the answer can never disagree.
============================================================ */
const $=(s,el=document)=>el.querySelector(s);
const rand=a=>a[Math.floor(Math.random()*a.length)];
const ri=(a,b)=>a+Math.floor(Math.random()*(b-a+1));

function rawValue(chain){
  let top=1, bot=1;
  for(const f of chain){ top*=f.tv; bot*=f.bv; }
  return top/bot;
}
function roundDose(v, mode){
  let d = mode==='whole'?0 : mode==='tenth'?1 : mode==='hundredth'?2
        : (Math.abs(v)<1?2:1); // 'auto' = nursing default
  const p=10**d;
  return Math.round((v+Number.EPSILON)*p)/p;
}
function finalAnswer(p){
  let v=rawValue(p.chain);
  if(p.divide) v=v/p.divide;
  return roundDose(v,p.round);
}
// A factor's units. tu/bu are single-unit shorthand; tus/bus allow COMPOUND
// denominators (or numerators) like mcg/(kg·min) used in critical-care drips.
function topUnits(f){ return f.tus || (f.tu? [f.tu] : []); }
function botUnits(f){ return f.bus || (f.bu? [f.bu] : []); }
// strike units that appear in both a top and a bottom somewhere in the chain
function cancelSet(chain){
  const tops=new Set(), bots=new Set();
  chain.forEach(f=>{ topUnits(f).forEach(u=>tops.add(u)); botUnits(f).forEach(u=>bots.add(u)); });
  const c=new Set();
  tops.forEach(u=>{ if(bots.has(u)) c.add(u); });
  return c;
}
function fmtNum(n){ return (Math.round(n*1000)/1000).toString(); }

function renderChain(p){ return renderChainOpts(p,{cancel:true,result:true}); }
function renderChainOpts(p,opts){
  const cancel = opts.cancel ? cancelSet(p.chain) : new Set();
  let html=`<div class="da"><span class="eq">X ${p.target} =</span>`;
  p.chain.forEach((f,i)=>{
    if(i>0) html+=`<span class="op">×</span>`;
    const tU=topUnits(f), bU=botUnits(f);
    const single = (f.bv===1 && bU.length===0);
    const uspan=u=>`<span class="unit ${cancel.has(u)?'struck':''}"> ${u}</span>`;
    const tu = tU.map(uspan).join('');
    const bu = bU.map(uspan).join('');
    html+=`<div class="frac ${single?'single':''}">
        <div class="top"><span class="num">${fmtNum(f.tv)}</span>${tu}</div>
        ${single?'':`<div class="bot"><span class="num">${fmtNum(f.bv)}</span>${bu}</div>`}
      </div>`;
  });
  html+=`</div>`;
  if(!opts.result) return html;
  const tops=p.chain.map(f=>f.tv).filter(v=>v!==1);
  const bots=p.chain.map(f=>f.bv).filter(v=>v!==1);
  const raw=rawValue(p.chain);
  let line=`<div class="result-line">= ${tops.join(' × ')||'1'} ÷ ${bots.join(' × ')||'1'} = ${fmtNum(raw)}`;
  if(p.divide){ line+=` &nbsp;→ split into ${p.divide} doses → ${fmtNum(raw/p.divide)}`; }
  line+=` &nbsp;<b>= ${finalAnswer(p)} ${p.target}</b></div>`;
  return html+line;
}

/* ---- Walkthrough reasoning engine (derives steps from the chain) ---- */
const KNOWN_CONV=[['g','mg','1 g = 1,000 mg'],['mg','mcg','1 mg = 1,000 mcg'],['kg','lb','1 kg = 2.2 lb'],
  ['L','mL','1 L = 1,000 mL'],['oz','mL','1 oz = 30 mL'],['tsp','mL','1 tsp = 5 mL'],
  ['tbsp','mL','1 tbsp = 15 mL'],['min','hr','1 hr = 60 min']];
function convStatement(u1,u2){ for(const[a,b,s] of KNOWN_CONV){ if((a===u1&&b===u2)||(a===u2&&b===u1)) return s; } return null; }
function roundWord(r){ return r==='whole'?'the nearest whole number':r==='tenth'?'the nearest tenth':r==='hundredth'?'the nearest hundredth':'the standard rule (tenth if over 1, hundredth if under 1)'; }
function isRate(p){ return /\//.test(p.target); }
function buildWalkthrough(p){
  const f0=p.chain[0];
  const hasConv=p.chain.some((f,i)=>i>0 && convStatement(f.tu,f.bu));
  // 1 — orient
  const s1=`<p>The question asks for an answer in <b>${p.target}</b>. In dimensional analysis you write your destination first:</p>
    <div class="da"><span class="eq">X ${p.target} =</span> <span class="muted" style="color:var(--muted)">…(everything else has to cancel down to this)</span></div>`;
  // 2 — key info
  let bullets=[];
  if(f0.bu) bullets.push(`<b>What's running:</b> ${fmtNum(f0.tv)} ${f0.tu} over ${fmtNum(f0.bv)} ${f0.bu}.`);
  else bullets.push(`<b>Ordered / starting amount:</b> ${fmtNum(f0.tv)} ${f0.tu}.`);
  p.chain.forEach((f,i)=>{ if(i===0) return;
    const cs=convStatement(f.tu,f.bu);
    if(cs) bullets.push(`<b>A conversion you'll need:</b> ${cs}.`);
    else if(f.tu==='gtt'||f.bu==='gtt') bullets.push(`<b>Drop factor:</b> ${fmtNum(f.tv)} ${f.tu} per ${fmtNum(f.bv)} ${f.bu}.`);
    else bullets.push(`<b>What's on hand:</b> ${fmtNum(f.bv)} ${f.bu} in every ${fmtNum(f.tv)} ${f.tu}.`);
  });
  if(p.divide) bullets.push(`<b>Heads up:</b> it's a daily dose split into ${p.divide} equal doses — they want <u>per dose</u>.`);
  const s2=`<p>Strip the question down to numbers that matter (ignore drug names and route words like PO/IM/IV — they don't change the math):</p>
    <ul class="tidy">${bullets.map(b=>`<li>${b}</li>`).join('')}</ul>`;
  // 3 — method
  let s3;
  if(p.target==='mL/hr') s3=`<p>This is an <b>IV pump rate</b>. Use volume over time: <code class="k">mL ÷ hr</code>. If the time is in minutes, bridge with <code class="k">60 min = 1 hr</code>. Dimensional analysis does both in one line.</p>`;
  else if(p.target==='gtt/min') s3=`<p>This is a <b>manual drip rate</b>. Use <code class="k">(volume × drop factor) ÷ time in minutes</code>. Watch the clock — the answer is per <u>minute</u>, so hours must become minutes first.</p>`;
  else if(hasConv) s3=`<p>The units don't match, so a conversion is required. <b>Dimensional analysis is the cleanest pick</b> — it folds the conversion right into the chain. (Desired-over-Have would force you to convert in a separate step first.)</p>`;
  else s3=`<p>The units already match, so any method works. We'll use <b>dimensional analysis</b> to stay consistent — but <code class="k">(D ÷ H) × Q</code> would give the same number.</p>`;
  // 4 set up, 5 cancel, 6 compute
  const s4=`<p>Lay the ordered amount down first, then add each fraction so the unit you want gone sits on the opposite level:</p>${renderChainOpts(p,{cancel:false,result:false})}`;
  const s5=`<p>Now cross out every unit that shows up on a top <i>and</i> a bottom. The only survivor should be <b>${p.target}</b> — if it isn't, a fraction is upside down.</p>${renderChainOpts(p,{cancel:true,result:false})}`;
  const s6=`<p>Multiply across the tops, multiply across the bottoms, divide${p.divide?`, then split into ${p.divide} doses`:''}:</p>${renderChainOpts(p,{cancel:true,result:true})}`;
  // 7 round
  const fa=finalAnswer(p);
  const lead = fa<1 ? `Because it's less than 1, keep the <b>leading zero</b> (write ${fa}, never ${String(fa).replace(/^0/,'')}). ` : '';
  const s7=`<p>Round to <b>${roundWord(p.round)}</b>. ${lead}Never leave a trailing zero.</p>
    <div class="callout tip" style="font-size:18px"><b>Final answer: ${fa} ${p.target}</b></div>`;
  return [
    {title:'1 · Read it — what are they asking?', html:s1},
    {title:'2 · Pull out the important info', html:s2},
    {title:'3 · Choose your approach', html:s3},
    {title:'4 · Set up the equation', html:s4},
    {title:'5 · Cancel the units', html:s5},
    {title:'6 · Multiply &amp; divide', html:s6},
    {title:'7 · Round &amp; format (ATI)', html:s7},
  ];
}

/* ============================================================
   PRACTICE GENERATORS  (each returns a problem object)
============================================================ */
function genConvert(){
  const opts=[
    ()=>{const v=rand([2,3,4,5,1.5,0.5]);return{prompt:`Convert <span class="ord">${v} g</span> to milligrams (mg).`,chain:[{tv:v,tu:'g',bv:1,bu:''},{tv:1000,tu:'mg',bv:1,bu:'g'}],target:'mg',round:'whole'};},
    ()=>{const v=rand([2,5,0.5,0.25,1.5]);return{prompt:`Convert <span class="ord">${v} mg</span> to micrograms (mcg).`,chain:[{tv:v,tu:'mg',bv:1,bu:''},{tv:1000,tu:'mcg',bv:1,bu:'mg'}],target:'mcg',round:'whole'};},
    ()=>{const kg=rand([10,20,40,50,70,90]);return{prompt:`A client weighs <span class="ord">${kg*2.2} lb</span>. Convert to kilograms (kg).`,chain:[{tv:kg*2.2,tu:'lb',bv:1,bu:''},{tv:1,tu:'kg',bv:2.2,bu:'lb'}],target:'kg',round:'tenth'};},
    ()=>{const oz=rand([1,2,3,4]);return{prompt:`Convert <span class="ord">${oz} oz</span> to milliliters (mL).`,chain:[{tv:oz,tu:'oz',bv:1,bu:''},{tv:30,tu:'mL',bv:1,bu:'oz'}],target:'mL',round:'whole'};},
    ()=>{const t=rand([1,2,3]);return{prompt:`Convert <span class="ord">${t} tsp</span> to milliliters (mL).`,chain:[{tv:t,tu:'tsp',bv:1,bu:''},{tv:5,tu:'mL',bv:1,bu:'tsp'}],target:'mL',round:'whole'};},
  ];
  return rand(opts)();
}
function genSolid(withConv=false){
  const drug=rand(['levothyroxine','prednisone','metoprolol','furosemide','digoxin','warfarin']);
  const H=rand([25,50,75,100,125,250,500]);
  const tabs=rand([0.5,1,2,3]);
  let D=H*tabs;
  if(withConv && Math.random()<0.6){
    // order in g (available mg) OR order in mg (available mcg)
    if(H<=125 && Math.random()<0.5){ // available mcg
      return {prompt:`Order: <span class="ord">${drug} ${D/1000} mg</span> PO. Available: ${drug} <b>${H} mcg</b> tablets. How many tablets per dose? (Round to nearest whole number.)`,
        chain:[{tv:D/1000,tu:'mg',bv:1,bu:''},{tv:1000,tu:'mcg',bv:1,bu:'mg'},{tv:1,tu:'tab',bv:H,bu:'mcg'}],target:'tablets',round:'whole'};
    } else { // available mg, order g
      return {prompt:`Order: <span class="ord">${drug} ${D/1000} g</span> PO. Available: ${drug} <b>${H} mg</b> tablets. How many tablets per dose? (Round to nearest whole number.)`,
        chain:[{tv:D/1000,tu:'g',bv:1,bu:''},{tv:1000,tu:'mg',bv:1,bu:'g'},{tv:1,tu:'tab',bv:H,bu:'mg'}],target:'tablets',round:'whole'};
    }
  }
  return {prompt:`Order: <span class="ord">${drug} ${D} mg</span> PO. Available: ${drug} <b>${H} mg</b> tablets. How many tablets per dose? (Round to nearest whole number.)`,
    chain:[{tv:D,tu:'mg',bv:1,bu:''},{tv:1,tu:'tab',bv:H,bu:'mg'}],target:'tablets',round:'whole'};
}
function genLiquid(){
  const drug=rand(['amoxicillin','acetaminophen','naproxen','cephalexin','ibuprofen']);
  const Q=rand([5,5,5,1]); const H=rand([125,250,100,50,160]);
  const D=H*rand([1,2,3,4])/rand([1,2]); // realistic order
  return {prompt:`Order: <span class="ord">${drug} ${D} mg</span> PO. Available: ${drug} oral suspension <b>${H} mg/${Q} mL</b>. How many mL per dose? (Round to nearest tenth.)`,

function fracHTML(tn,tu,bn,bu){
  return `<div class="frac"><div class="top"><span class="num">${tn}</span> <span class="unit">${tu}</span></div>`+
         `<div class="bot"><span class="num">${bn}</span> <span class="unit">${bu}</span></div></div>`;
}
function renderThreeMethods(p){
  const {D,H,Q,massU,formU}=p, ans=finalAnswer(p);
  const m1=`<h4>Method 1 · Ratio &amp; Proportion</h4>
    <p>Write the strength you <b>have</b> as a ratio, set it equal to the <b>desired</b> dose with the unknown X, then cross-multiply.</p>
    <div class="da">${fracHTML(H,massU,Q,formU)}<span class="op">=</span>${fracHTML(D,massU,'X',formU)}</div>
    <div class="result-line">Cross-multiply: ${H} · X = ${D} · ${Q} &nbsp;→&nbsp; X = (${D} × ${Q}) ÷ ${H} <b>= ${ans} ${p.target}</b></div>`;
  const m2=`<h4>Method 2 · Desired Over Have (D ÷ H × Q)</h4>
    <p><code class="k">D</code> = desired (${D} ${massU}) · <code class="k">H</code> = have (${H} ${massU}) · <code class="k">Q</code> = quantity (${Q} ${formU}).</p>
    <div class="result-line">(D ÷ H) × Q = (${D} ÷ ${H}) × ${Q} = ${fmtNum(D/H)} × ${Q} <b>= ${ans} ${p.target}</b></div>`;
  const m3=`<h4>Method 3 · Dimensional Analysis</h4>${renderChain(p)}`;
  return m1+m2+m3;
}

/* ============================================================
   LEVEL 2 — multi-step / NCLEX-hard generators
   Every one of these forces 2+ "jumps" in a single chain:
   a unit conversion AND a strength/rate factor (sometimes a
   divided-dose split on top). Same engine, harder questions.
============================================================ */
// lb values that divide cleanly by 2.2 → tidy kg (10..100)
const CLEAN_LB=[33,44,55,66,77,88,99,110,121,132];

// 1 · Dosages by weight → all the way to a deliverable dose (mL or tabs)
function genWeightHard(){
  if(Math.random()<0.6){
    // weight → kg → mg/day → mL/day → ÷doses → mL/dose  (4 jumps + split)
    // retry until the per-dose volume lands in a clinically sane band
    for(let tries=0;tries<40;tries++){
      const lb=rand([22,33,44,55,66]); // pediatric weights (kg 10..30)
      const [name,H,Q]=rand([['amoxicillin',250,5],['cephalexin',250,5],['acetaminophen',160,5],['cefdinir',125,5]]);
      const R=rand([20,25,30,40,45]);
      const every=rand([6,8,12]); const doses=24/every;
      const p={prompt:`Order: <span class="ord">${name} ${R} mg/kg/day</span> PO divided every ${every} hr. The child weighs <b>${lb} lb</b>. Available: ${name} oral suspension <b>${H} mg/${Q} mL</b>. How many mL per <u>dose</u>? (Round to the nearest tenth.)`,
        chain:[{tv:lb,tu:'lb',bv:1,bu:''},{tv:1,tu:'kg',bv:2.2,bu:'lb'},{tv:R,tu:'mg',bv:1,bu:'kg'},{tv:Q,tu:'mL',bv:H,bu:'mg'}],
        target:'mL', round:'tenth', divide:doses,
        hint:`Four jumps: lb → kg → mg/day → mL/day, <i>then</i> split into ${doses} doses. The chain gives mL per day — don't forget the last ÷${doses}.`};
      const a=finalAnswer(p);
      if(a>=2 && a<=20) return p;
    }
  }
  const lb=rand(CLEAN_LB);
  // weight → kg → mg/day → ÷doses → mg/dose, where the order is per kg/day
  const [name,R]=rand([['vancomycin',45],['gentamicin',7.5],['acyclovir',30],['ampicillin',100],['cefotaxime',150]]);
  const every=rand([6,8,12]); const doses=24/every;
  return {prompt:`Order: <span class="ord">${name} ${R} mg/kg/day</span> IV divided every ${every} hr. The child weighs <b>${lb} lb</b>. How many mg per <u>dose</u>? (Round to the nearest whole number.)`,
    chain:[{tv:lb,tu:'lb',bv:1,bu:''},{tv:1,tu:'kg',bv:2.2,bu:'lb'},{tv:R,tu:'mg',bv:1,bu:'kg'}],
    target:'mg', round:'whole', divide:doses,
    hint:`lb → kg → mg per <i>day</i>, then split into ${doses} equal doses.`};
}

// 2 · Injectable → order unit ≠ label unit, so a conversion rides inside the chain
function genInjectHard(){
  if(Math.random()<0.55){
    // g ordered, mg/mL on hand:  g → mg → mL
    const [name,H]=rand([['ceftriaxone',250],['ampicillin',125],['nafcillin',100],['cefazolin',225],['vancomycin',500]]);
    const g=rand([0.25,0.5,0.75,1]);
    return {prompt:`Order: <span class="ord">${name} ${g} g</span> IM. Available: ${name} <b>${H} mg/mL</b>. How many mL? (Round to the nearest tenth.)`,
      chain:[{tv:g,tu:'g',bv:1,bu:''},{tv:1000,tu:'mg',bv:1,bu:'g'},{tv:1,tu:'mL',bv:H,bu:'mg'}],
      target:'mL', round:'tenth',
      hint:`The order is in g but the vial is in mg. Bridge with 1 g = 1,000 mg, <i>then</i> use the strength.`};
  }
  // mg ordered, mcg/mL on hand:  mg → mcg → mL  (high-alert: digoxin etc.)
  const [name,H]=rand([['digoxin',250],['fentanyl',50],['hydromorphone',500],['glycopyrrolate',200]]);
  const D=rand([0.1,0.125,0.2,0.25,0.5]);
  return {prompt:`Order: <span class="ord">${name} ${D} mg</span> IV. Available: ${name} <b>${H} mcg/mL</b>. How many mL? (Round to the nearest hundredth.)`,
    chain:[{tv:D,tu:'mg',bv:1,bu:''},{tv:1000,tu:'mcg',bv:1,bu:'mg'},{tv:1,tu:'mL',bv:H,bu:'mcg'}],
    target:'mL', round:'hundredth',
    hint:`mg → mcg first (1 mg = 1,000 mcg), then divide by the mcg/mL strength.`};
}

// 3 · Oral → conversions both ways: g→mg→mL/tabs, and household tsp→mL→mg
function genOralHard(){
  const pick=Math.random();
  if(pick<0.4){
    // g → mg → mL (liquid)
    const [name,H,Q]=rand([['amoxicillin',250,5],['cephalexin',250,5],['penicillin V',125,5],['azithromycin',200,5]]);
    const g=rand([0.25,0.5,0.75,1]);
    return {prompt:`Order: <span class="ord">${name} ${g} g</span> PO. Available: ${name} oral solution <b>${H} mg/${Q} mL</b>. How many mL? (Round to the nearest tenth.)`,
      chain:[{tv:g,tu:'g',bv:1,bu:''},{tv:1000,tu:'mg',bv:1,bu:'g'},{tv:Q,tu:'mL',bv:H,bu:'mg'}],
      target:'mL', round:'tenth',
      hint:`g → mg → mL. Convert the gram order to mg before you touch the strength.`};
  }
  if(pick<0.7){
    // g → mg → tablets  (pick the count first so it's always a clean 1–3 tabs)
    const [name,H]=rand([['metformin',500],['valacyclovir',500],['cephalexin',250],['acetaminophen',500],['amoxicillin',250]]);
    const count=rand([1,2,3]);
    const g=+(count*H/1000); // e.g. 500 mg × 2 = 1 g
    return {prompt:`Order: <span class="ord">${name} ${g} g</span> PO. Available: ${name} <b>${H} mg</b> tablets. How many tablets? (Round to the nearest whole number.)`,
      chain:[{tv:g,tu:'g',bv:1,bu:''},{tv:1000,tu:'mg',bv:1,bu:'g'},{tv:1,tu:'tab',bv:H,bu:'mg'}],
      target:'tablets', round:'whole',
      hint:`g → mg → tablets. 1 g = 1,000 mg, then divide by the tablet strength.`};
  }
  // household tsp → mL → mg  (how much drug is in that spoonful?)
  const [name,H,Q]=rand([['amoxicillin',250,5],['acetaminophen',160,5],['ibuprofen',100,5],['cefdinir',125,5]]);
  const tsp=rand([0.5,1,1.5,2]);
  return {prompt:`A caregiver gives <span class="ord">${tsp} tsp</span> of ${name} <b>${H} mg/${Q} mL</b>. How many mg did the child receive? (Round to the nearest whole number.)`,
    chain:[{tv:tsp,tu:'tsp',bv:1,bu:''},{tv:5,tu:'mL',bv:1,bu:'tsp'},{tv:H,tu:'mg',bv:Q,bu:'mL'}],
    target:'mg', round:'whole',
    hint:`tsp → mL → mg. 1 tsp = 5 mL, then apply the strength to get mg.`};
}

// 4 · Parenteral / IV → a RATE in, a RATE out (units/hr or mg/hr → mL/hr)
function genIVHard(){
  const pick=Math.random();
  if(pick<0.4){
    // heparin: units/hr ordered, units-in-a-bag on hand → mL/hr
    const rate=rand([500,800,1000,1200,1500]);
    const [bagU,bagML]=rand([[25000,500],[25000,250],[20000,500],[10000,250]]);
    return {prompt:`Order: heparin infusion at <span class="ord">${rate.toLocaleString()} units/hr</span>. Available: <b>${bagU.toLocaleString()} units in ${bagML} mL</b> NS. Set the pump to how many mL/hr? (Round to the nearest whole number.)`,
      chain:[{tv:rate,tu:'units',bv:1,bu:'hr'},{tv:bagML,tu:'mL',bv:bagU,bu:'units'}],
      target:'mL/hr', round:'whole',
      hint:`You're handed a dose <i>rate</i> (units/hr) and a bag concentration. units cancel → mL/hr falls out.`};
  }
  if(pick<0.7){
    // drug mg/hr ordered, mg-in-a-bag on hand → mL/hr
    const [name,bagMg,bagML]=rand([['aminophylline',500,250],['dopamine',400,250],['lidocaine',2000,500],['procainamide',2000,500]]);
    const rate=rand([20,30,40,50,60]);
    return {prompt:`Order: ${name} at <span class="ord">${rate} mg/hr</span>. Available: <b>${bagMg.toLocaleString()} mg in ${bagML} mL</b>. Set the pump to how many mL/hr? (Round to the nearest tenth.)`,
      chain:[{tv:rate,tu:'mg',bv:1,bu:'hr'},{tv:bagML,tu:'mL',bv:bagMg,bu:'mg'}],
      target:'mL/hr', round:'tenth',
      hint:`mg/hr ÷ (mg per mL) = mL/hr. The mg cancel; you're left with mL over hr.`};
  }
  // liters over hours → mL/hr  (L → mL bridge)
  const L=rand([1,1.5,2]); const hr=rand([8,10,12,24]);
  return {prompt:`Infuse <span class="ord">${L} L</span> of lactated Ringer's over <b>${hr} hr</b>. Set the pump to how many mL/hr? (Round to the nearest whole number.)`,
    chain:[{tv:L,tu:'L',bv:hr,bu:'hr'},{tv:1000,tu:'mL',bv:1,bu:'L'}],
    target:'mL/hr', round:'whole',
    hint:`The volume is in liters — convert to mL (1 L = 1,000 mL) before dividing by the hours.`};
}

// 5 · Powdered / reconstituted → the concentration is built, not handed to you
function genPowderHard(){
  const pick=Math.random();
  if(pick<0.45){
    // label states final concentration; order is in g → g → mg → mL
    const [name,conc]=rand([['cefazolin',225],['ampicillin',250],['ceftriaxone',350],['nafcillin',250]]);
    const g=rand([0.25,0.5,0.75,1]);
    return {prompt:`The vial of <span class="ord">${name}</span> reads: reconstitute, final concentration <b>${conc} mg/mL</b>. Order: ${name} <b>${g} g</b> IM. How many mL? (Round to the nearest tenth.)`,
      chain:[{tv:g,tu:'g',bv:1,bu:''},{tv:1000,tu:'mg',bv:1,bu:'g'},{tv:1,tu:'mL',bv:conc,bu:'mg'}],
      target:'mL', round:'tenth',
      hint:`Use the <i>reconstituted</i> concentration (${conc} mg/mL). But first convert the ${g} g order to mg.`};
  }
  if(pick<0.8){
    // YOU compute the concentration: total powder ÷ final volume
    const G=rand([1,2]); const V=rand([2.5,4,5,8,10]);
    const D=rand([250,300,400,500,600,750]);
    return {prompt:`A <span class="ord">${G} g</span> vial is reconstituted to a <b>final volume of ${V} mL</b>. Order: <b>${D} mg</b> IM. How many mL? (Round to the nearest tenth.)`,
      chain:[{tv:D,tu:'mg',bv:1,bu:''},{tv:1,tu:'g',bv:1000,bu:'mg'},{tv:V,tu:'mL',bv:G,bu:'g'}],
      target:'mL', round:'tenth',
      hint:`No concentration is printed — build it: all ${G} g of powder now lives in ${V} mL. That's your strength.`};
  }
  // units powder (penicillin): order in units, label yields units/mL
  const [conc] = rand([[250000],[500000],[100000]]);
  const U=rand([300000,500000,600000,750000]);
  return {prompt:`A penicillin G vial is reconstituted to <b>${conc.toLocaleString()} units/mL</b>. Order: <span class="ord">${U.toLocaleString()} units</span> IM. How many mL? (Round to the nearest tenth.)`,
    chain:[{tv:U,tu:'units',bv:1,bu:''},{tv:1,tu:'mL',bv:conc,bu:'units'}],
    target:'mL', round:'tenth',
    hint:`Reconstituted strength is units/mL — divide the ordered units by it.`};
}

// 6 · Compound denominators — critical-care drips: a per-kg-per-time dose → mL/hr.
// These need TWO units on the bottom of one fraction (mcg/kg/min), which is why
// the engine grew tus/bus. The weight kills the kg, the 60 min/hr kills the min.
function genDripHard(){
  if(Math.random()<0.6){
    // mcg/kg/min → mL/hr  (dopamine, dobutamine, nitroprusside…)
    const wt=rand([50,60,70,75,80,90]);
    const dose=rand([2,3,5,8,10]);
    const [name,bagMg,bagML]=rand([['dopamine',400,250],['dobutamine',500,250],['dopamine',800,500],['nitroprusside',50,250]]);
    return {prompt:`Order: <span class="ord">${name} ${dose} mcg/kg/min</span>. The client weighs <b>${wt} kg</b>. Available: <b>${bagMg} mg in ${bagML} mL</b> D5W. Set the pump to how many mL/hr? (Round to the nearest tenth.)`,
      chain:[
        {tv:dose,tu:'mcg',bv:1,bus:['kg','min']},
        {tv:wt,tu:'kg',bv:1,bu:''},
        {tv:60,tu:'min',bv:1,bu:'hr'},
        {tv:1,tu:'mg',bv:1000,bu:'mcg'},
        {tv:bagML,tu:'mL',bv:bagMg,bu:'mg'}
      ],
      target:'mL/hr', round:'tenth',
      hint:`Five jumps. The dose is per kg <i>and</i> per min — you need the <b>weight</b> to cancel kg, and <b>60 min/hr</b> to cancel min. Then mcg → mg → mL.`};
  }
  // units/kg/hr → mL/hr  (weight-based heparin drip — compound, but no time bridge)
  const wt=rand([60,70,80,90,100]);
  const dose=rand([12,14,16,18]);
  const [bagU,bagML]=rand([[25000,500],[25000,250],[20000,500]]);
  return {prompt:`Order: <span class="ord">heparin ${dose} units/kg/hr</span>. The client weighs <b>${wt} kg</b>. Available: <b>${bagU.toLocaleString()} units in ${bagML} mL</b> NS. Set the pump to how many mL/hr? (Round to the nearest tenth.)`,
    chain:[
      {tv:dose,tu:'units',bv:1,bus:['kg','hr']},
      {tv:wt,tu:'kg',bv:1,bu:''},
      {tv:bagML,tu:'mL',bv:bagU,bu:'units'}
    ],
    target:'mL/hr', round:'tenth',
    hint:`The dose is per kg per hr. Use the <b>weight</b> to cancel kg; the hr is already what the pump wants, so no time conversion here.`};
}

const HARD_POOL=[genWeightHard, genInjectHard, genOralHard, genIVHard, genPowderHard, genDripHard];
function hardProblem(){ return rand(HARD_POOL)(); }

/* ============================================================
   STATE / PROGRESS
============================================================ */
const KEY='dosagecalc.progress.v1';
let state=load();
function load(){ try{return JSON.parse(localStorage.getItem(KEY))||{};}catch{return{};} }
function save(){ localStorage.setItem(KEY,JSON.stringify(state)); }
function modState(id){ if(!state[id]) state[id]={correct:0,attempts:0,done:false}; return state[id]; }
const GOAL=5;

let current='welcome', activeTab='learn';

/* ============================================================
   RENDER
============================================================ */
function renderNav(){
  const nav=$('#nav'); nav.innerHTML='';
  modules.forEach(m=>{
    if(m.divider){
      const d=document.createElement('div');
      d.className='navlabel';
      d.textContent=m.name;
      nav.appendChild(d);
      return;
    }
    const s=modState(m.id);
    const b=document.createElement('button');
    b.className=(m.id===current?'active':'');
    b.innerHTML=`<span class="ic">${m.icon}</span><span class="nm">${m.name}</span>${s.done?'<span class="ck">✓</span>':''}`;
    b.onclick=()=>go(m.id);
    nav.appendChild(b);
  });
  const realmods=modules.filter(m=>!m.divider);
  const total=realmods.length;
  const done=realmods.filter(m=>modState(m.id).done).length;
  $('#progbar').style.width=(done/total*100)+'%';
  $('#progtext').textContent=`${done} of ${total} modules done`;
}

function setDrawer(open){
  const side=$('.side'), ov=$('#overlay');
  if(side) side.classList.toggle('open',open);
  if(ov) ov.classList.toggle('show',open);
}
function go(id){ current=id; activeTab='learn'; renderNav(); renderMain(); setDrawer(false); window.scrollTo(0,0); }
function openTab(t){ activeTab=t; renderMain(); }

function renderMain(){
  const m=modules.find(x=>x.id===current);
  const s=modState(m.id);
  let tabs='';
  const practiceLabel = m.guided?'🧠 Walkthrough':m.realtest?'📝 Take the test':'✏️ Practice';
  if(!m.noPractice){
    tabs=`<div class="pill-tabs">
      <button class="${activeTab==='learn'?'on':''}" onclick="openTab('learn')">📖 ${m.guided||m.realtest?'How it works':'Learn'}</button>
      <button class="${activeTab==='practice'?'on':''}" onclick="openTab('practice')">${practiceLabel} ${s.done?'✓':''}</button>
    </div>`;
  }
  let subline;
  if(m.noPractice) subline='';
  else if(m.guided) subline=`Walk through a question step by step. You've walked through ${s.correct} so far.`;
  else if(m.realtest){ subline = s.best!=null ? `Your best score so far: ${s.best}%.` : 'Pick a length and go — no hints until the end.'; }
  else subline=`Learn the idea, then practice until it sticks. Need ${GOAL} correct for a ✓ — you have ${s.correct}.`;
  let body = (activeTab==='learn'||m.noPractice)? m.lesson() : renderPractice(m);
  $('#main').innerHTML=`<h2 class="title">${m.title}</h2>
     <p class="sub">${subline}</p>
     ${tabs}${body}`;
  if(activeTab==='practice' && !m.noPractice) mountPractice(m);
}

/* ---------- Practice (numeric) ---------- */
let pq=null; // current problem
function renderPractice(m){
  if(m.mcq) return `<div id="pwrap"></div>`;
  return `<div id="pwrap"></div>`;
}
function mountPractice(m){
  if(m.guided){ mountGuided(m); return; }
  if(m.realtest){ mountRealTest(m); return; }
  if(m.mcq){ mountMCQ(m); return; }
  newProblem(m);
}
function nextProblem(){ const m=modules.find(x=>x.id===current); newProblem(m); }

function newProblem(m){
  pq = m.exam ? structuredCopy(rand(EXAM)) : m.gen();
  const s=modState(m.id);
  const wrap=$('#pwrap');
  wrap.innerHTML=`
    <div class="qbox">
      <div class="qmeta"><span>${m.icon} ${m.name}</span>
        <span class="scorepill">✓ ${s.correct} correct · ${s.attempts} tried</span></div>
      <div class="qprompt">${pq.prompt}</div>
      ${pq.hint?`<div class="callout tip" style="margin-top:0">${pq.hint}</div>`:''}
      <div class="answer-row">
        <input id="ans" type="text" inputmode="decimal" placeholder="?" autocomplete="off">
        <span class="unit-tag">${pq.target}</span>
        <button class="btn" id="checkBtn">Check</button>
        <button class="ghost btn" id="skipBtn">New question →</button>
      </div>
      <div class="feedback" id="fb"></div>
    </div>`;
  const input=$('#ans');
  input.focus();
  input.addEventListener('keydown',e=>{ if(e.key==='Enter') doCheck(m); });
  $('#checkBtn').onclick=()=>doCheck(m);
  $('#skipBtn').onclick=()=>newProblem(m);
}

function doCheck(m){
  const input=$('#ans');
  const raw=input.value.trim();
  if(raw==='') { input.focus(); return; }
  const val=parseFloat(raw);
  const expect=finalAnswer(pq);
  const ok = Math.abs(val-expect) < 0.005 + Math.abs(expect)*0.001;
  const s=modState(m.id);
  s.attempts++;
  const fb=$('#fb');
  // formatting note
  let fmtNote='';
  if(ok){
    if(/^\./.test(raw)) fmtNote=' <i>(Tip: add the leading zero — write 0'+raw+'.)</i>';
    else if(/\.\d*0$/.test(raw)) fmtNote=' <i>(Tip: drop the trailing zero.)</i>';
  }
  const sol = pq.showMethods ? renderThreeMethods(pq) : renderChain(pq);
  if(ok){
    s.correct++;
    if(s.correct>=GOAL && !s.done){ s.done=true; }
    fb.className='feedback ok show';
    fb.innerHTML=`<h5>✅ Correct — ${expect} ${pq.target}${fmtNote}</h5>
      <div>Here's the setup:</div><div class="solution">${sol}</div>
      <div class="start-row"><button class="btn" id="nextB">Next question →</button></div>`;
  } else {
    fb.className='feedback no show';
    fb.innerHTML=`<h5>Not quite — the answer is ${expect} ${pq.target}</h5>
      <div>You wrote ${raw}. Walk through it slowly:</div>
      <div class="solution">${sol}</div>
      <div class="start-row"><button class="btn" id="nextB">Try another →</button></div>`;
  }
  $('#nextB').onclick=()=>newProblem(m);
  // disable inputs after checking
  $('#checkBtn').disabled=true; input.disabled=true;
  save(); renderNav();
  $('#main').querySelector('.sub')?.replaceChildren();
  // update sub line score
  const sub=$('.sub'); if(sub) sub.textContent=`Learn the idea, then practice until it sticks. Need ${GOAL} correct for a ✓ — you have ${s.correct}.`;
}

/* ---------- Practice (MCQ for safety) ---------- */
let mcqIdx=0;
function mountMCQ(m){
  mcqIdx=Math.floor(Math.random()*m.mcq.length);
  drawMCQ(m);
}
function drawMCQ(m){
  const s=modState(m.id);
  const q=m.mcq[mcqIdx];
  $('#pwrap').innerHTML=`
    <div class="qbox">
      <div class="qmeta"><span>${m.icon} Safety check</span><span class="scorepill">✓ ${s.correct} correct</span></div>
      <div class="qprompt">${q.q}</div>
      <div class="mcq" id="mcq">${q.a.map((a,i)=>`<button data-i="${i}">${a}</button>`).join('')}</div>
      <div class="feedback" id="fb"></div>
    </div>`;
  $('#mcq').querySelectorAll('button').forEach(btn=>{
    btn.onclick=()=>{
      const i=+btn.dataset.i; const correct=q.correct;
      s.attempts++;
      $('#mcq').querySelectorAll('button').forEach(b=>b.disabled=true);
      btn.classList.add(i===correct?'correct':'wrong');
      if(i!==correct) $('#mcq').querySelector(`[data-i="${correct}"]`).classList.add('correct');
      const fb=$('#fb');
      if(i===correct){ s.correct++; if(s.correct>=GOAL&&!s.done)s.done=true; fb.className='feedback ok show'; fb.innerHTML=`<h5>✅ Right.</h5><div>${q.why}</div>`; }
      else { fb.className='feedback no show'; fb.innerHTML=`<h5>Not safe.</h5><div>${q.why}</div>`; }
      fb.innerHTML+=`<div class="start-row"><button class="btn" id="nextB">Next →</button></div>`;
      $('#nextB').onclick=()=>{ mcqIdx=(mcqIdx+1)%m.mcq.length; drawMCQ(m); };
      save(); renderNav();
      const sub=$('.sub'); if(sub) sub.textContent=`Learn the idea, then practice until it sticks. Need ${GOAL} correct for a ✓ — you have ${s.correct}.`;
    };
  });
}

function structuredCopy(o){ return JSON.parse(JSON.stringify(o)); }

/* ---------- Guided walkthrough ---------- */
let gw=null; // {p, steps, shown}
function mountGuided(m){ newGuided(m); }
function newGuided(m){
  const p=randomProblem();
  gw={p, steps:buildWalkthrough(p), shown:0};
  const s=modState(m.id);
  $('#pwrap').innerHTML=`
    <div class="qbox">
      <div class="qmeta"><span>🧠 Walkthrough · random topic</span>
        <span class="scorepill">walked through ${s.correct}</span></div>
      <div class="qprompt">${p.prompt}</div>
      <div class="answer-row" style="margin-bottom:6px">
        <input id="gans" type="text" inputmode="decimal" placeholder="your guess (optional)" autocomplete="off" style="width:200px">
        <span class="unit-tag">${p.target}</span>
      </div>
      <div id="gsteps"></div>
      <div class="start-row" id="gctrl"></div>
    </div>`;
  drawGuided(m);
}
function drawGuided(m){
  const box=$('#gsteps');
  box.innerHTML = gw.steps.slice(0,gw.shown).map(st=>
    `<div class="card" style="margin:12px 0 0;background:#0c1322"><h4 style="margin-top:0;color:var(--indigo)">${st.title}</h4>${st.html}</div>`
  ).join('');
  const ctrl=$('#gctrl');
  if(gw.shown < gw.steps.length){
    const next=gw.steps[gw.shown];
    ctrl.innerHTML=`<button class="btn" id="gnext">→ Reveal: ${next.title.replace(/^\d+ · /,'')}</button>`;
    $('#gnext').onclick=()=>{ gw.shown++; drawGuided(m); window.scrollTo(0,document.body.scrollHeight); };
  } else {
    ctrl.innerHTML=`<div style="width:100%"><p style="margin:14px 0 8px">How did you do on this one?</p>
      <div class="start-row">
        <button class="btn" id="ggot">✅ I got it right</button>
        <button class="ghost btn" id="gmiss">✗ I missed it</button>
        <button class="ghost btn" id="gskip">New question →</button>
      </div></div>`;
    const finish=(right)=>{ const s=modState(m.id); s.attempts++; if(right){ s.correct++; if(s.correct>=GOAL&&!s.done)s.done=true; } save(); renderNav(); newGuided(m); };
    $('#ggot').onclick=()=>finish(true);
    $('#gmiss').onclick=()=>finish(false);
    $('#gskip').onclick=()=>newGuided(m);
  }
}

/* ---------- Real practice test ---------- */
let test=null; // {qs:[], i, answers:[]}
function mountRealTest(m){ testStart(m); }
function testStart(m){
  test=null;
  $('#pwrap').innerHTML=`
    <div class="qbox">
      <div class="qprompt">How many questions?</div>
      <div class="seg" id="lenseg">
        <button data-n="10">10 — quick</button>
        <button data-n="20" class="on">20 — standard</button>
        <button data-n="30">30 — full</button>
      </div>
      <div class="start-row"><button class="btn" id="tstart">Begin test →</button></div>
    </div>`;
  let n=20;
  $('#lenseg').querySelectorAll('button').forEach(b=>b.onclick=()=>{
    n=+b.dataset.n; $('#lenseg').querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on');
  });
  $('#tstart').onclick=()=>{
    const pick = m.hardPool ? hardProblem : testProblem;
    const qs=[]; for(let k=0;k<n;k++) qs.push(pick());
    test={qs, i:0, answers:[]};
    testQuestion(m);
  };
}
function testQuestion(m){
  const p=test.qs[test.i];
  $('#pwrap').innerHTML=`
    <div class="qbox">
      <div class="qmeta"><span>📝 Question ${test.i+1} of ${test.qs.length}</span>
        <span class="scorepill">no hints — answer & submit</span></div>
      <div class="bar" style="margin-bottom:14px"><i style="width:${(test.i/test.qs.length*100)}%"></i></div>
      <div class="qprompt">${p.prompt}</div>
      ${p.hint?`<div class="callout tip" style="margin-top:0">${p.hint}</div>`:''}
      <div class="answer-row">
        <input id="tans" type="text" inputmode="decimal" placeholder="?" autocomplete="off">
        <span class="unit-tag">${p.target}</span>
        <button class="btn" id="tsub">${test.i===test.qs.length-1?'Submit & finish':'Submit & next →'}</button>
      </div>
    </div>`;
  const input=$('#tans'); input.focus();
  const submit=()=>{
    const raw=input.value.trim();
    const val=raw===''?NaN:parseFloat(raw);
    const expect=finalAnswer(p);
    const ok=Math.abs(val-expect)<0.005+Math.abs(expect)*0.001;
    test.answers.push({p, raw:raw===''?'(blank)':raw, expect, ok});
    test.i++;
    if(test.i<test.qs.length) testQuestion(m); else testResults(m);
  };
  input.addEventListener('keydown',e=>{ if(e.key==='Enter') submit(); });
  $('#tsub').onclick=submit;
}
function testResults(m){
  const total=test.answers.length;
  const correct=test.answers.filter(a=>a.ok).length;
  const pct=Math.round(correct/total*100);
  const s=modState(m.id); s.attempts++;
  if(s.best==null||pct>s.best) s.best=pct;
  if(pct>=80) s.done=true;
  save(); renderNav();
  const grade = pct>=90?'Outstanding.':pct>=80?'Solid — you\'re test-ready.':pct>=70?'Almost there — review the misses.':'Keep drilling — you\'ve got this.';
  const wrong=test.answers.filter(a=>!a.ok);
  const review = wrong.length
    ? `<h4>Review the ${wrong.length} you missed</h4>` + wrong.map(a=>`
        <div class="card" style="margin:10px 0;background:#0c1322">
          <div class="qprompt" style="font-size:15px">${a.p.prompt}</div>
          <p style="color:var(--bad)">You wrote: ${a.raw} &nbsp;·&nbsp; <span style="color:var(--good)">Correct: ${a.expect} ${a.p.target}</span></p>
          <div class="solution">${a.p.showMethods?renderThreeMethods(a.p):renderChain(a.p)}</div>
        </div>`).join('')
    : `<div class="callout tip"><b>Perfect score — every single one.</b> 🎉</div>`;
  $('#pwrap').innerHTML=`
    <div class="qbox">
      <div style="text-align:center;padding:10px 0">
        <div style="font-size:46px;font-weight:800;color:${pct>=80?'var(--good)':pct>=70?'var(--amber)':'var(--bad)'}">${pct}%</div>
        <div style="font-size:18px">${correct} / ${total} correct</div>
        <p class="sub" style="margin-top:6px">${grade}</p>
      </div>
      ${review}
      <div class="start-row" style="margin-top:18px">
        <button class="btn" id="tretake">↺ Take another test</button>
      </div>
    </div>`;
  $('#tretake').onclick=()=>testStart(m);
}

/* reset */
$('#resetBtn').onclick=()=>{
  if(confirm('Reset all progress? This clears your checkmarks and scores.')){
    state={}; save(); go('welcome');
  }
};

/* mobile drawer toggle */
$('#hambtn').onclick=()=>{ const side=$('.side'); setDrawer(!side.classList.contains('open')); };
$('#overlay').onclick=()=>setDrawer(false);

/* boot */
renderNav(); renderMain();
</script>
